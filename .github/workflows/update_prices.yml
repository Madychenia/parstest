name: Update Prices & Take Screenshots

on:
  schedule:
    - cron: '*/10 * * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Обновил до v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5  # Обновил до v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas requests beautifulsoup4 pytz streamlit

      - name: Run parser
        run: |
          python app.py --parse

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Убираем ошибку 128: сначала забираем изменения из GitHub
          git pull origin main --rebase
          
          git add price_history.json last_run.json
          
          # Фиксируем изменения, если они есть
          git commit -m "Auto-update prices [skip ci]" || exit 0
          
          git push origin main
