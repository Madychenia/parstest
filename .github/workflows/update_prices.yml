name: Update Prices

on:
  schedule:
    - cron: '0 */6 * * *' # Авто-запуск каждые 6 часов
  workflow_dispatch:      # Кнопка для ручного запуска в GitHub Actions

permissions:
  contents: write         # Разрешение роботу записывать изменения в файлы

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas requests beautifulsoup4 pytz streamlit

      - name: Run parser
        run: |
          python app.py --parse

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add price_history.json last_run.json
          git commit -m "Auto-update prices [skip ci]" || exit 0
          git push
