name: Hourly Price Check

on:
  schedule:
    # Запуск в 05:00 и 23:00 по Киеву (03:00 и 21:00 UTC)
    - cron: '0 3,21 * * *'
  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas requests beautifulsoup4 pytz lxml streamlit

      - name: Run parser
        run: python app.py --parse

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add price_history.json last_run.json
          git commit -m "Hourly price update" || echo "No changes to commit"
          git push
