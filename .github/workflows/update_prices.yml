name: Update Prices & Take Screenshots

on:
  schedule:
    - cron: '*/10 * * * *'  # Авто-запуск каждые 10 минут
  push:                     # Запуск сразу после сохранения (удобно для тестов)
    branches: [ main ]
  workflow_dispatch:        # Кнопка для ручного запуска

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0    # Важно для подгрузки истории изменений

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas requests beautifulsoup4 pytz streamlit

      - name: Run parser
        run: |
          python app.py --parse

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Забираем изменения, чтобы не было конфликтов
          git pull --rebase origin main
          
          # Добавляем файлы цен
          git add price_history.json last_run.json
          
          # Если изменений нет, просто выходим без ошибки
          git commit -m "Auto-update prices [skip ci]" || exit 0
          
          # Отправляем в репозиторий
          git push origin main
